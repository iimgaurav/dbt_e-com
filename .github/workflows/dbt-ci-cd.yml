name: dbt CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  dbt-ci-cd:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: gau
          POSTGRES_PASSWORD: gau@123
          POSTGRES_DB: e_com
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'   # ✅ make sure requirements.txt is in repo root

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PostgreSQL client        # ✅ FIX 1 — added sudo
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create dev_schema in Postgres    # ✅ FIX 2 — removed duplicate PGPASSWORD, one clean env var
        run: |
          PGPASSWORD=gau@123 psql -h localhost -U gau -d e_com -c "CREATE SCHEMA IF NOT EXISTS dev_schema;"

      - name: dbt Debug
        working-directory: ./dbt_project/dbt_ecom
        env:                                   # ✅ FIX 3 — env vars passed so profiles.yml can read them
          DB_HOST: localhost
          DB_USER: gau
          DB_PASSWORD: gau@123
          DB_NAME: e_com
          DB_SCHEMA: dev_schema
          DB_PORT: 5432
        run: dbt debug --profiles-dir .dbt

      - name: dbt Parse
        working-directory: ./dbt_project/dbt_ecom
        env:
          DB_HOST: localhost
          DB_USER: gau
          DB_PASSWORD: gau@123
          DB_NAME: e_com
          DB_SCHEMA: dev_schema
          DB_PORT: 5432
        run: dbt parse --profiles-dir .dbt --target dev

      - name: dbt Seed
        working-directory: ./dbt_project/dbt_ecom
        env:
          DB_HOST: localhost
          DB_USER: gau
          DB_PASSWORD: gau@123
          DB_NAME: e_com
          DB_SCHEMA: dev_schema
          DB_PORT: 5432
        run: dbt seed --profiles-dir .dbt --target dev --full-refresh

      - name: dbt Run
        working-directory: ./dbt_project/dbt_ecom
        env:
          DB_HOST: localhost
          DB_USER: gau
          DB_PASSWORD: gau@123
          DB_NAME: e_com
          DB_SCHEMA: dev_schema
          DB_PORT: 5432
        run: dbt run --profiles-dir .dbt --target dev

      - name: dbt Test
        working-directory: ./dbt_project/dbt_ecom
        env:
          DB_HOST: localhost
          DB_USER: gau
          DB_PASSWORD: gau@123
          DB_NAME: e_com
          DB_SCHEMA: dev_schema
          DB_PORT: 5432
        run: dbt test --profiles-dir .dbt --target dev
        continue-on-error: true

      - name: dbt Docs Generate
        working-directory: ./dbt_project/dbt_ecom
        env:
          DB_HOST: localhost
          DB_USER: gau
          DB_PASSWORD: gau@123
          DB_NAME: e_com
          DB_SCHEMA: dev_schema
          DB_PORT: 5432
        run: dbt docs generate --profiles-dir .dbt --target dev
        continue-on-error: true

      - name: Upload dbt Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt_project/dbt_ecom/target/
            dbt_project/dbt_ecom/logs/
          retention-days: 30

      - name: Comment PR with dbt Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = `## dbt CI/CD Results\n\n` +
              `✅ Pipeline completed!\n\n` +
              `**Steps Executed:**\n` +
              `- ✓ dbt parse\n` +
              `- ✓ dbt seed\n` +
              `- ✓ dbt run\n` +
              `- ✓ dbt test\n` +
              `- ✓ dbt docs generate\n\n` +
              `[View detailed logs in Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true